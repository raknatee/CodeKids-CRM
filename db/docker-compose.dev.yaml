services:
  coredb:
    build:
      context: .
      platforms:
        - linux/amd64
    environment:
        MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_db_user.txt
        MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_db_password.txt

    secrets:
      - mongo_db_user.txt
      - mongo_db_password.txt

    ports:
      - "27017:27017"
    volumes:
      - coredb_data:/data/db


volumes:
  coredb_data:

